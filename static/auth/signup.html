<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng ký tài khoản</title>
  <style>
    :root { --primary: #059669; --error: #dc2626; --success: #16a34a; --bg: #f3f4f6; }
    body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
    h3 { margin: 0 0 1.5rem; text-align: center; color: #1f2937; }
    input { width: 100%; padding: 0.75rem; margin-bottom: 1rem; border: 1px solid #d1d5db; border-radius: 4px; box-sizing: border-box; outline: none; }
    input:focus { border-color: var(--primary); ring: 2px var(--primary); }
    button { width: 100%; padding: 0.75rem; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; transition: opacity 0.2s; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    #msg { min-height: 1.25rem; margin-top: 1rem; font-size: 0.875rem; text-align: center; }
    .error { color: var(--error); }
    .success { color: var(--success); }
    .link { display: block; text-align: center; margin-top: 1rem; font-size: 0.875rem; color: var(--primary); text-decoration: none; }
  </style>
</head>
<body>

<div class="card">
  <h3>Đăng ký</h3>
  
  <input id="username" type="text" placeholder="Tên đăng nhập mới" />
  <input id="password" type="password" placeholder="Mật khẩu" />
  
  <button id="btnSignup" onclick="signup()">Tạo tài khoản</button>

  <p id="msg"></p>
  
  <a href="/auth/login.html" class="link">Đã có tài khoản? Đăng nhập</a>
</div>

<script>
/**
 * Hiển thị thông báo
 */
function setMsg(text, type = "") {
  const msgEl = document.getElementById("msg");
  msgEl.textContent = text || "";
  msgEl.className = type;
}

/**
 * Xử lý logic đăng ký
 */
async function signup() {
  const userInp = document.getElementById("username");
  const passInp = document.getElementById("password");
  const btn = document.getElementById("btnSignup");

  if (userInp.value.length < 3 || passInp.value.length < 6) {
    return setMsg("Tên (min 3) và Mật khẩu (min 6) quá ngắn", "error");
  }

  btn.disabled = true;
  setMsg("Đang xử lý...", "");

  try {
    const response = await fetch("/auth/register", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        username: userInp.value,
        password: passInp.value
      })
    });

    const result = await response.json().catch(() => ({}));

    if (result.success) {
      setMsg("Đăng ký thành công! Đang chuyển hướng...", "success");
      // Chuyển sang trang đăng nhập sau khi đăng ký thành công
      setTimeout(() => { window.location.href = "/auth/login.html"; }, 1500);
    } else {
      setMsg(result.error || "Không thể tạo tài khoản", "error");
    }
  } catch (err) {
    setMsg("Lỗi kết nối máy chủ", "error");
  } finally {
    btn.disabled = false;
  }
}
</script>
<script src="/password-toggle.js"></script>

</body>
</html>
