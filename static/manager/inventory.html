<!doctype html><html lang="vi"><head><meta charset="utf-8"><title>ThimPOS - Quản lý kho</title><link rel="stylesheet" href="/thimpos.css"><style>.page{padding:20px;color:var(--tp-text)}.card{background:var(--tp-panel);padding:16px;border-radius:12px;margin-bottom:16px}.row{display:flex;gap:8px;flex-wrap:wrap}input,select,button{padding:8px;border:0;border-radius:6px;background:#1f2937;color:inherit}button{background:var(--tp-active);cursor:pointer}table{width:100%;border-collapse:collapse}th,td{padding:8px;border-bottom:1px solid #334155;text-align:left}.bad{color:#fb7185}.muted{opacity:.55}</style></head><body><main class="page"><h1>Quản lý kho</h1>
<section class="card"><h2>Nguyên liệu</h2><div class="row"><input id="iname" placeholder="Tên nguyên liệu"><input id="iunit" placeholder="Đơn vị (g, cái, ml...)"><button onclick="addItem()">Thêm</button></div><table><thead><tr><th>Tên</th><th>Đơn vị</th><th>Tồn tính từ sổ</th><th></th></tr></thead><tbody id="items"></tbody></table></section>
<section class="card"><h2>Nhập lô</h2><div class="row"><select id="litem"></select><input id="lqty" type="number" step="any" placeholder="Số lượng"><input id="lcost" type="number" placeholder="Giá nhập / đơn vị"><label>Mua <input id="lbought" type="date"></label><label>Hết hạn <input id="lexp" type="date"></label><input id="lnote" placeholder="Ghi chú"><button onclick="addLot()">Nhập kho</button></div><table><thead><tr><th>Nguyên liệu</th><th>Nhập</th><th>Còn</th><th>Giá nhập</th><th>Ngày mua</th><th>Hết hạn</th><th></th></tr></thead><tbody id="lots"></tbody></table></section>
<section class="card"><h2>Công thức sản phẩm</h2><div class="row"><select id="rproduct"></select><select id="ritem"></select><input id="rqty" type="number" step="any" placeholder="Lượng dùng / 1 sản phẩm"><button onclick="addRecipe()">Liên kết</button></div><table><thead><tr><th>Sản phẩm</th><th>Nguyên liệu</th><th>Lượng dùng</th><th></th></tr></thead><tbody id="recipes"></tbody></table></section></main><script>
const api='/api/inventory';let products=[],itemData=[];const req=async(u,o={})=>{const r=await fetch(u,{headers:{'Content-Type':'application/json'},...o});if(!r.ok){alert((await r.json()).error||'Có lỗi xảy ra');return null}return r.json()}, epoch=id=>Math.floor(new Date(document.getElementById(id).value+'T00:00:00').getTime()/1000), date=x=>new Date(x*1000).toLocaleDateString('vi-VN');
async function load(){const [items,lots,recipes,p]=await Promise.all([req(api+'/items'),req(api+'/lots'),req(api+'/recipes'),req('/api/products?limit=100&active_only=true')]);if(!items)return;itemData=items;products=p.data;itemsEl=document.getElementById('items');itemsEl.innerHTML=items.map(i=>`<tr class="${i.is_active?'':'muted'}"><td>${i.name}</td><td>${i.unit}</td><td class="${i.on_hand<0?'bad':''}">${i.on_hand}</td><td><button onclick="toggleItem(${i.id},'${i.name}','${i.unit}',${!i.is_active})">${i.is_active?'Ẩn':'Mở'}</button></td></tr>`).join('');document.querySelectorAll('#litem,#ritem').forEach(s=>s.innerHTML=items.filter(i=>i.is_active).map(i=>`<option value="${i.id}">${i.name} (${i.unit})</option>`).join(''));document.getElementById('rproduct').innerHTML=products.map(x=>`<option value="${x.id}">${x.name}</option>`).join('');document.getElementById('lots').innerHTML=lots.map(l=>`<tr class="${l.is_void?'muted':''}"><td>${l.item_name}</td><td>${l.quantity}</td><td>${l.remaining}</td><td>${l.unit_cost.toLocaleString('vi-VN')}</td><td>${date(l.purchased_at)}</td><td class="${l.expires_at<Date.now()/1000?'bad':''}">${date(l.expires_at)}</td><td>${l.is_void?'Đã hủy':`<button onclick="voidLot(${l.id})">Hủy lô</button>`}</td></tr>`).join('');document.getElementById('recipes').innerHTML=recipes.map(x=>`<tr class="${x.is_active?'':'muted'}"><td>${products.find(p=>p.id==x.product_id)?.name||'#'+x.product_id}</td><td>${x.item_name}</td><td>${x.quantity} ${x.unit}</td><td><button onclick="toggleRecipe(${x.id},${x.quantity},${!x.is_active})">${x.is_active?'Ẩn':'Mở'}</button></td></tr>`).join('')}
async function addItem(){await req(api+'/items',{method:'POST',body:JSON.stringify({name:iname.value,unit:iunit.value})});load()}async function toggleItem(id,name,unit,a){await req(api+'/items/'+id,{method:'PUT',body:JSON.stringify({name,unit,is_active:a})});load()}async function addLot(){await req(api+'/lots',{method:'POST',body:JSON.stringify({item_id:+litem.value,quantity:+lqty.value,unit_cost:+lcost.value,purchased_at:epoch('lbought'),expires_at:epoch('lexp'),note:lnote.value})});load()}async function voidLot(id){if(confirm('Hủy lô bằng một bút toán đảo ngược?')){await req(api+'/lots/'+id,{method:'DELETE',body:JSON.stringify({note:'Hủy từ màn hình quản lý'})});load()}}async function addRecipe(){await req(api+'/recipes',{method:'POST',body:JSON.stringify({product_id:+rproduct.value,item_id:+ritem.value,quantity:+rqty.value})});load()}async function toggleRecipe(id,q,a){await req(api+'/recipes/'+id,{method:'PUT',body:JSON.stringify({quantity:q,is_active:a})});load()}load();
</script><script src="/thimpos.js" defer></script></body></html>
